<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Minimalist dark background matching the SaaS card design -->
  <rect width="1020" height="1020" x="2" y="2" rx="240" fill="#111111" stroke="rgba(255, 255, 255, 0.08)" stroke-width="24"/>
  <!-- Modern bold tracking typography rendering L:S -->
  <text x="50%" y="52%" 
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="460" 
        font-weight="800" 
        fill="#FAFAFA" 
        text-anchor="middle" 
        dominant-baseline="middle"
        letter-spacing="-0.04em">L:S</text>
</svg>
